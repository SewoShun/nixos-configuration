name: Update flake.lock

on:
  schedule:
    - cron: '0 15 * * *' # Daily at 15:00 UTC = 00:00 JST
  workflow_dispatch:

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get datetime (JST)
        id: datetime
        run: echo "jst=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build before flake.lock update (dix comparison source)
      - name: Build desktop (before update)
        id: old-desktop
        run: |
          p=$(nix build .#nixosConfigurations.desktop.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$p" >> "$GITHUB_OUTPUT"

      - name: Build thinkpad-e14-gen7 (before update)
        id: old-thinkpad
        run: |
          p=$(nix build .#nixosConfigurations.thinkpad-e14-gen7.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$p" >> "$GITHUB_OUTPUT"

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Build after flake.lock update (dix comparison target)
      - name: Build desktop (after update)
        id: new-desktop
        run: |
          p=$(nix build .#nixosConfigurations.desktop.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$p" >> "$GITHUB_OUTPUT"

      - name: Build thinkpad-e14-gen7 (after update)
        id: new-thinkpad
        run: |
          p=$(nix build .#nixosConfigurations.thinkpad-e14-gen7.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$p" >> "$GITHUB_OUTPUT"

      - name: Generate dix diff
        id: dix
        run: |
          nix run nixpkgs#dix -- --force-correctness --color never \
            "${{ steps.old-desktop.outputs.path }}" \
            "${{ steps.new-desktop.outputs.path }}" \
            > dix-desktop.log 2>&1 || true

          nix run nixpkgs#dix -- --force-correctness --color never \
            "${{ steps.old-thinkpad.outputs.path }}" \
            "${{ steps.new-thinkpad.outputs.path }}" \
            > dix-thinkpad.log 2>&1 || true

          for host in desktop thinkpad; do
            DIFF=$(cat "dix-${host}.log")
            CONTENT="\`\`\`
          ${DIFF:-No changes}
          \`\`\`"
            if [ "${#CONTENT}" -gt 3900 ]; then
              CONTENT="${CONTENT:0:3900}
          ...(truncated)"
            fi
            {
              echo "${host}_desc<<EOF"
              printf '%s' "$CONTENT"
              echo
              echo EOF
            } >> "$GITHUB_OUTPUT"
          done

      - name: Create Pull Request
        id: cpr
        if: always() && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake.lock"
          branch: update/flake-lock
          delete-branch: true
          title: "chore: update flake.lock (${{ steps.datetime.outputs.jst }})"
          body: |
            Auto-generated by GitHub Actions.

            **Desktop:**
            ${{ steps.dix.outputs.desktop_desc }}

            **ThinkPad:**
            ${{ steps.dix.outputs.thinkpad_desc }}

      - name: Merge Pull Request
        if: success() && steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord - desktop
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "NixOS flake.lock updated - desktop"
          description: |
            ${{ steps.datetime.outputs.jst }}

            ${{ steps.dix.outputs.desktop_desc }}
          color: 0x00FF00

      - name: Notify Discord - thinkpad-e14-gen7
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "NixOS flake.lock updated - thinkpad-e14-gen7"
          description: |
            ${{ steps.datetime.outputs.jst }}

            ${{ steps.dix.outputs.thinkpad_desc }}
          color: 0x00FF00

      - name: Notify Discord on failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "NixOS flake.lock update failed"
          description: "${{ steps.datetime.outputs.jst }} - Build or update failed. Please check the logs."
          color: 0xFF0000
